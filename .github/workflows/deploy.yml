name: Deploy to GitHub Pages

# Builds the vite-ssg site and publishes dist/ to GitHub Pages (https://vanduo.dev).
#
# @vanduo-oss/core and @vanduo-oss/framework now install from npm (the .npmrc
# excludes the @vanduo-oss/* scope from the minimum-release-age delay). The only
# first-party dependency still consumed locally is @vanduo-oss/vue (file:../vue)
# — not yet published — so it is checked out as a sibling and built before vd2.
# vue is a public vanduo-oss repo; if it becomes private, add a PAT secret and
# pass `token: ${{ secrets.VANDUO_CHECKOUT_TOKEN }}` to its checkout step.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout vd2
        uses: actions/checkout@v4
        with:
          path: vd2

      - name: Checkout @vanduo-oss/vue
        uses: actions/checkout@v4
        with:
          repository: vanduo-oss/vue
          ref: main
          path: vue

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build @vanduo-oss/vue
        working-directory: vue
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install & build vd2
        working-directory: vd2
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Disable Jekyll processing
        run: touch vd2/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vd2/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
