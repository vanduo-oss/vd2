name: Deploy to GitHub Pages

# Builds the vite-ssg site and publishes dist/ to GitHub Pages (https://vanduo.dev).
#
# vd2 consumes two first-party packages via `file:../` rather than the registry:
#   - @vanduo-oss/framework  (ships a committed dist/, used as-is)
#   - @vanduo-oss/core       (dist/ is gitignored upstream, so we build it here;
#                             lifecycle scripts are blocked by .npmrc, so the
#                             build must be invoked explicitly)
# They are checked out as siblings so the `file:../core` / `file:../framework`
# specifiers resolve. Both are public vanduo-oss repos, so the default
# GITHUB_TOKEN can clone them. If either becomes private, add a PAT secret and
# pass `token: ${{ secrets.VANDUO_CHECKOUT_TOKEN }}` to those checkout steps.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy; don't cancel a running one (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout vd2
        uses: actions/checkout@v4
        with:
          path: vd2

      - name: Checkout @vanduo-oss/core
        uses: actions/checkout@v4
        with:
          repository: vanduo-oss/core
          ref: main
          path: core

      - name: Checkout @vanduo-oss/framework
        uses: actions/checkout@v4
        with:
          repository: vanduo-oss/framework
          ref: main
          path: framework

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build @vanduo-oss/core (regenerates its gitignored dist/)
        working-directory: core
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install & build vd2
        working-directory: vd2
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Disable Jekyll processing
        run: touch vd2/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vd2/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
