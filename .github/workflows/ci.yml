name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All @vanduo-oss/* dependencies install from npm (the @vanduo-oss/* scope is
# excluded from the .npmrc minimum-release-age delay), so this is single-repo.

# Least-privilege default token: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.28.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run stylelint
      - run: pnpm run format:check

      - run: pnpm test

      - run: pnpm run build
      - run: pnpm run test:size

      # Functional e2e only. The visual-parity suite is intentionally excluded
      # here: its snapshots are platform-specific (captured on macOS/darwin) and
      # would need separate Linux baselines, so it stays a local check.
      - name: E2E (functional)
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm exec playwright test --project='Chromium Desktop' tests/e2e/layout-navigation.spec.ts
