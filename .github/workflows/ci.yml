name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All @vanduo-oss/* dependencies install from npm (the @vanduo-oss/* scope is
# excluded from the .npmrc minimum-release-age delay), so this is single-repo.
jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run stylelint
      - run: pnpm run format:check

      - run: pnpm test

      - run: pnpm run build
      - run: pnpm run test:size
