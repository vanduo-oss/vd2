name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All @vanduo-oss/* dependencies install from npm (the @vanduo-oss/* scope is
# excluded from the .npmrc minimum-release-age delay), so this is single-repo.

# Least-privilege default token: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run stylelint
      - run: pnpm run format:check

      - run: pnpm test

      - run: pnpm run build
      - run: pnpm run test:size

      # Functional e2e only. The visual-parity suite is intentionally excluded
      # here: its snapshots are platform-specific (captured on macOS/darwin) and
      # would need separate Linux baselines, so it stays a local check.
      - name: E2E (functional)
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm exec playwright test --project='Chromium Desktop' tests/e2e/layout-navigation.spec.ts
